services:
  redis:
    image: redis:8
    container_name: dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  tiles:
    image: nginx:1.27-alpine
    container_name: dev-tiles
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./tiles:/srv/tiles:ro
      - ./ops/nginx/tiles.conf:/etc/nginx/conf.d/default.conf:ro
