server {
  listen 80;
  server_name _;

  location /tiles/ {
    alias /srv/tiles/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=60" always;
    try_files $uri =404;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
